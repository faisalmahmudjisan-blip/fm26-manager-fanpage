<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cup History | Emma Risako</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="history-page">

    <header class="site-header">
        <div class="header-inner">
            <div class="header-branding">
                <span class="system-id">TOURNAMENT // ARCHIVE</span>
                <h1 class="page-title">Domestic <span class="surname">Cups</span></h1>
            </div>
            <nav class="main-nav">
                <a href="index.html" class="nav-item"><span class="nav-num">01</span>Overview</a>
                <a href="career-by-year.html" class="nav-item active"><span class="nav-num">02</span>History</a>
                <a href="trophies.html" class="nav-item"><span class="nav-num">03</span>Honours</a>
            </nav>
        </div>
    </header>

    <main class="history-container">
        
        <section class="stat-ribbon">
            <div class="ribbon-item"><label>CUP DEBUT</label><span>2025</span></div>
            <div class="ribbon-item"><label>BEST FINISH</label><span class="accent-text">Quarter-Final</span></div>
            <div class="ribbon-item"><label>TOTAL GOALS</label><span>0</span></div>
            <div class="ribbon-item"><label>CLEAN SHEETS</label><span>0</span></div>
        </section>

        <div class="dual-column-layout">
            <section class="table-card main-col">
                <div class="card-header-alt">
                    <h2>Empress's Cup // Historical Runs</h2>
                </div>
                <div class="table-wrapper">
                    <table class="manager-table">
                        <thead>
                            <tr>
                                <th>Season</th>
                                <th>Round reached</th>
                                <th>Opponent</th>
                                <th>Result</th>
                                <th>Score</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>2025/26</td>
                                <td>Quarter-Final</td>
                                <td class="club-cell">Urawa Reds</td>
                                <td><span class="status-pill loss">L</span></td>
                                <td>1 - 2</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <aside class="sidebar-col">
                <div class="table-card">
                    <div class="card-header-alt"><h3>Cup Top Scorer</h3></div>
                    <div class="sidebar-stat">
                        <span class="player-name">Yuma Saito</span>
                        <span class="stat-value">0 Goals</span>
                    </div>
                </div>
            </aside>
        </div>
    </main>
</body>
</html>
