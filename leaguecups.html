<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cup History | Emma Risako</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="history-page">

    <header class="site-header">
        <div class="header-inner">
            <div class="header-branding">
                <span class="system-id">TOURNAMENT // ARCHIVE</span>
                <h1 class="page-title">League <span class="surname">Cups</span></h1>
            </div>
            <nav class="main-nav">
                <a href="index.html" class="nav-item"><span class="nav-num">01</span>Overview</a>
                <a href="career-by-year.html" class="nav-item active"><span class="nav-num">02</span>History</a>
                <a href="trophies.html" class="nav-item"><span class="nav-num">03</span>Honours</a>
            </nav>
        </div>
    </header>

    <main class="history-container">

        <section class="table-card">
        <div class="table-wrapper">
            <table class="manager-table">
                <thead>
                    <tr>
                        <th>Season</th>
                        <th>Round reached</th>
                        <th>Club</th>
                        <th>Result</th>
                        <th>Score</th>
                    </tr>
                </thead>
                <tbody>
                    <tr class="winner-row">
                        <td>2025/26</td>
                        <td class="bold-cell">Final</td>
                        <td class="club-cell">RB Omiya Ardija</td>
                        <td><span class="status-pill loss">L</span></td>
                        <td class="score-cell">0 - 1</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>
    </main>
</body>
</html>
