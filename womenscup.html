<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Women's Cup | Emma Risako Archive</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="tournament-page">

    <header class="site-header">
        <div class="header-inner">
            <div class="header-branding">
                <span class="system-id">TOURNAMENT // ARCHIVE</span>
                <h1 class="page-title">Women's <span class="surname">Cup</span></h1>
            </div>
            <nav class="main-nav">
                <a href="index.html" class="nav-item">Overview</a>
                <a href="career-by-year.html" class="nav-item active">History</a>
                <a href="trophies.html" class="nav-item">Honours</a>
            </nav>
        </div>
    </header>

<main class="history-container">

    <section class="table-card">
        <div class="table-wrapper">
            <table class="manager-table">
                <thead>
                    <tr>
                        <th>Season</th>
                        <th>Round reached</th>
                        <th>Club</th>
                        <th>Result</th>
                        <th>Score</th>
                    </tr>
                </thead>
                <tbody>
                    <tr class="winner-row">
                        <td>2025/26</td>
                        <td class="bold-cell">Final</td>
                        <td class="club-cell">RB Omiya Ardija</td>
                        <td><span class="status-pill win">W</span></td>
                        <td class="score-cell">4 - 1</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>

</main>
